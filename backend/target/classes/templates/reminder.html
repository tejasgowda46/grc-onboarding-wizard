            ```
            <!-- Card Container -->
            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:10px; padding:30px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">

                <!-- Header -->
                <tr>
                    <td align="center" style="padding-bottom:20px;">
                        <h2 style="color:#2c3e50; margin:0;">🚀 Onboarding Wizard</h2>
                        <p style="color:#7f8c8d; margin:5px 0;">Daily Reminder</p>
                    </td>
                </tr>

                <!-- Greeting -->
                <tr>
                    <td style="padding:10px 0;">
                        <p style="font-size:16px; color:#333;">
                            Hello <b th:text="${name}">User</b>,
                        </p>
                        <p style="font-size:14px; color:#555;">
                            This is your daily reminder to complete your onboarding tasks.
                        </p>
                    </td>
                </tr>

                <!-- Task Box -->
                <tr>
                    <td style="background:#f8fafc; border-left:5px solid #3498db; padding:15px; border-radius:6px; margin-top:10px;">
                        <p style="margin:0; font-size:14px;">
                            <strong>📌 Task:</strong>
                            <span th:text="${task}">Complete onboarding steps</span>
                        </p>
                        <p style="margin:5px 0 0 0; font-size:14px;">
                            <strong>⏰ Deadline:</strong>
                            <span th:text="${deadline}">Today</span>
                        </p>
                    </td>
                </tr>

                <!-- Button -->
                <tr>
                    <td align="center" style="padding:25px 0;">
                        <a href="#"
                           style="background:#3498db; color:#ffffff; text-decoration:none; padding:12px 25px; border-radius:5px; font-size:14px;">
                            View Task
                        </a>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="text-align:center; color:#95a5a6; font-size:12px;">
                        <p style="margin:0;">Please complete your task before the deadline.</p>
                        <p style="margin:10px 0 0;">
                            © 2026 Onboarding Wizard
                        </p>
                    </td>
                </tr>

            </table>

        </td>
    </tr>

</html>
